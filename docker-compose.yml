version: '3.8'

services:
  localstack:
    image: localstack/localstack:3.0
    container_name: document-intake-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3          # Only S3 — we use in-memory for SQS locally
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - PERSIST_DATA=false   # Fresh state on restart
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/DocumentIntake.API/Dockerfile
    container_name: document-intake-api
    ports:
      - "5000:8080"
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AWS__ServiceURL=http://localstack:4566
      - AWS__BucketName=documents-local
      - AWS__Region=us-east-1
      - Security__ApiKey=dev-api-key-change-in-prod
    volumes:
      - ./logs:/app/logs